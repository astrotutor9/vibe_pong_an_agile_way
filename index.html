<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            color: white;
            font-family: Arial, sans-serif;
        }
        #game-container {
            width: 800px;
            height: 600px;
            background-color: black;
            border: 4px solid white;
            position: relative;
            box-sizing: border-box;
        }
        .paddle {
            position: absolute;
            background-color: white;
            width: 10px;
            height: 100px;
        }
        #left-paddle {
            left: 0;
            top: 250px;
        }
        #right-paddle {
            right: 0;
            top: 250px;
        }
        #ball {
            position: absolute;
            background-color: white;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            left: 395px;
            top: 295px;
        }
        #score-display {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        #start-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 2px solid white;
            z-index: 10;
        }
        #winner-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 4px solid white;
            z-index: 20;
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score-display">0 : 0</div>
        <div id="start-message">GET READY!</div>
        <div id="winner-message"></div>
        <div id="left-paddle" class="paddle"></div>
        <div id="right-paddle" class="paddle"></div>
        <div id="ball"></div>
    </div>
    <script src="game.js"></script>
</body>
</html>
